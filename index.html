<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0078D4, #00BCF2);
      font-family: Segoe UI;
    }
    .container { text-align: center; }
    .label { color: white; font-size: 18px; margin-bottom: 10px; }
    .count { color: white; font-size: 72px; font-weight: bold; }
    .status { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">🟢 Live Count</div>
    <div class="count" id="count">...</div>
    <div class="status" id="status">Connecting...</div>
  </div>
  <script>
    function fetchCount() {
      fetch('/api/count?' + Date.now(), { cache: 'no-store' })
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(d => {
          document.getElementById('count').innerText = d.count;
